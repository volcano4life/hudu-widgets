
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111113}
.shell{background:#111113;border-radius:0;padding:16px;margin:0;overflow:hidden}
.doc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #2a2a2e}
.doc-title-text{font-size:14px;font-weight:500;color:#e8e8f0}.doc-title-sub{font-size:11px;color:#555560;margin-top:2px}
.doc-right{display:flex;align-items:center;gap:8px}
.version-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(29,158,117,0.15);color:#3dcca0;border:1px solid rgba(29,158,117,0.25);letter-spacing:.5px}
.changelog-btn{font-size:11px;padding:4px 10px;cursor:pointer;color:#888898;background:#1c1c1f;border:1px solid #2a2a2e;border-radius:7px;display:flex;align-items:center;gap:5px;transition:all .15s}
.changelog-btn:hover,.changelog-btn.open{background:#222226;border-color:#3a3a3e;color:#c0c0cc}
.changelog-panel{display:none;background:#0d0d0f;border:1px solid #2a2a2e;border-radius:10px;padding:14px 16px;margin-bottom:14px}
.changelog-panel.open{display:block}
.cl-title{font-size:13px;font-weight:500;color:#e8e8f0;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.cl-entries{display:flex;flex-direction:column;gap:0}
.cl-entry{display:grid;grid-template-columns:90px 1fr;border-left:1px solid #2a2a2e;padding-bottom:0;margin-left:6px}
.cl-meta{padding:0 14px 0 0;position:relative}
.cl-meta::before{content:'';width:9px;height:9px;border-radius:50%;background:#3dcca0;position:absolute;left:-5px;top:4px;border:1px solid #3dcca0}
.cl-ver{font-size:12px;font-weight:600;color:#3dcca0;padding-left:10px;line-height:1.4}
.cl-date{font-size:10px;color:#444450;padding-left:10px;margin-top:1px}
.cl-body{padding-top:3px}
.cl-change{font-size:12px;color:#8888a0;line-height:1.5;display:flex;align-items:baseline;gap:6px;padding:1px 0}
.cl-dot{width:3px;height:3px;border-radius:50%;background:#555570;flex-shrink:0;margin-top:6px}
.q-tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.q-tab{display:flex;flex-direction:column;align-items:stretch;padding:14px 14px 12px;border-radius:12px;border:1px solid #2a2a2e;background:#1c1c1f;cursor:pointer;transition:all .15s}
.q-tab:hover{border-color:#3a3a3e;background:#222226}.q-tab.active{border-color:transparent}
.q-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.q-iw{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.q-label{font-size:14px;font-weight:500;color:#a0a0a8;line-height:1.2}.q-tab.active .q-label{color:#fff}
.q-total{font-size:11px;color:#444450;margin-top:2px}.q-tab.active .q-total{color:rgba(255,255,255,0.4)}
.q-breakdown{display:grid;grid-template-columns:repeat(2,1fr);gap:4px}
.q-stat{background:#17171a;border-radius:6px;padding:6px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.q-tab.active .q-stat{background:rgba(0,0,0,0.2)}
.q-stat-label{font-size:11px;color:#555560;font-weight:500;white-space:nowrap}.q-tab.active .q-stat-label{color:rgba(255,255,255,0.5)}
.q-stat-nums{font-size:11px;color:#444450;text-align:right;white-space:nowrap}.q-tab.active .q-stat-nums{color:rgba(255,255,255,0.55)}
.q-pane{display:none}.q-pane.active{display:block}
.tt-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tt-tab{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:8px;border:1px solid #2a2a2e;background:#1c1c1f;cursor:pointer;font-size:12px;font-weight:500;color:#777788;transition:all .15s}
.tt-tab:hover{border-color:#3a3a3e;color:#a0a0a8}.tt-tab.active{border-color:transparent;color:#fff}.tt-tab i{font-size:14px}
.tt-pane{display:none}.tt-pane.active{display:block}
.pane-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.pane-left{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.pane-title{font-size:15px;font-weight:500;color:#fff}
.toggle-btns{display:flex;gap:5px}
.toggle-btn{font-size:11px;padding:4px 10px;cursor:pointer;color:#888898;background:#1c1c1f;border:1px solid #2a2a2e;border-radius:6px;display:flex;align-items:center;gap:4px;transition:all .15s}
.toggle-btn:hover{background:#222226;border-color:#3a3a3e;color:#c0c0cc}
.stats{display:flex;gap:16px}.stat{text-align:right}.stat-n{font-size:18px;font-weight:500;color:#fff}.stat-l{font-size:10px;color:#555560;margin-top:1px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px}
.cat{background:#1c1c1f;border:1px solid #2a2a2e;border-radius:10px;overflow:hidden;transition:border-color .15s}
.cat:hover{border-color:#3a3a3e}
.cat-head{display:flex;align-items:center;gap:11px;padding:12px 13px;cursor:pointer;user-select:none;-webkit-user-select:none}
.c-iw{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.c-name{flex:1;font-size:13px;font-weight:500;color:#e8e8f0}
.c-badge{font-size:11px;font-weight:500;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chev{font-size:13px;color:#555560;transition:transform .18s;flex-shrink:0}.chev.open{transform:rotate(180deg)}
.sub-wrap{display:none;border-top:1px solid #2a2a2e;background:#17171a}.sub-wrap.open{display:block}
.sub-inner{padding:10px 13px 13px}
.sub-item{display:flex;align-items:center;gap:9px;padding:5px 9px;border-radius:6px;transition:background .12s}.sub-item:hover{background:#222226}
.sub-n{font-size:10px;color:#444450;min-width:14px;flex-shrink:0;text-align:right}
.sub-txt{font-size:12px;color:#8888a0;line-height:1.4}
.copy-row{display:flex;justify-content:flex-end;margin-top:9px;padding-top:9px;border-top:1px solid #2a2a2e}
.copy-btn{font-size:11px;padding:4px 11px;cursor:pointer;color:#8888a0;background:#222226;border:1px solid #2a2a2e;border-radius:6px;display:flex;align-items:center;gap:5px;transition:all .15s}
.copy-btn:hover{background:#2a2a2e;color:#c0c0cc}.copy-btn.done{color:#34c88a}
.doc-footer{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:12px;border-top:1px solid #2a2a2e;flex-wrap:wrap;gap:6px}
.footer-creator{display:flex;align-items:center;gap:7px;font-size:11px;color:#444450}
.footer-meta{font-size:11px;color:#333340;display:flex;align-items:center;gap:12px}
.footer-ver{color:#2a4a2a;font-weight:600}
</style>
<div class="shell">
  <div class="doc-header">
    <div><div class="doc-title-text">Autotask Ticket Categories</div><div class="doc-title-sub">Queue · Issue Type · Sub-Issue Type reference</div></div>
    <div class="doc-right">
      <span class="version-badge">v2.1</span>
      <button class="changelog-btn" id="clbtn" onclick="toggleCL()"><i class="ti ti-history" style="font-size:13px"></i>Changelog</button>
    </div>
  </div>
  <div class="changelog-panel" id="clpanel">
    <div class="cl-title"><i class="ti ti-history" style="font-size:15px;color:#555570"></i>Change log</div>
    <div class="cl-entries">
      <div class="cl-entry">
        <div class="cl-meta"><div class="cl-ver">v2.1</div><div class="cl-date">May 2026</div></div>
        <div class="cl-body">
          <div class="cl-change"><span class="cl-dot"></span>Initial writeup and share for feedback</div>
        </div>
      </div>
    </div>
  </div>
  <div class="q-tabs" id="qtabs"></div>
  <div id="qpanes"></div>
  <div class="doc-footer">
    <div class="footer-creator"><i class="ti ti-user-circle" style="color:#444450;font-size:13px"></i>Created by <strong style="color:#666680;font-weight:500;margin-left:3px">Rytis Kavaliauskas</strong></div>
    <div class="footer-meta"><span>Autotask Ticket Categories</span><span class="footer-ver">v2.1</span></div>
  </div>
</div>
<script>
function toggleCL(){const p=document.getElementById("clpanel"),b=document.getElementById("clbtn"),o=p.classList.toggle("open");b.classList.toggle("open",o);b.innerHTML=o?'<i class="ti ti-x" style="font-size:13px"></i>Close':'<i class="ti ti-history" style="font-size:13px"></i>Changelog';}
const TT={incident:{label:"Incident",icon:"ti-alert-circle",accent:"#7F77DD",iBg:"rgba(127,119,221,0.18)",bBg:"rgba(127,119,221,0.18)",bClr:"#a8a2f0"},request:{label:"Service request",icon:"ti-clipboard-list",accent:"#1D9E75",iBg:"rgba(29,158,117,0.18)",bBg:"rgba(29,158,117,0.18)",bClr:"#3dcca0"},change:{label:"Change request",icon:"ti-settings-2",accent:"#BA7517",iBg:"rgba(186,117,23,0.18)",bBg:"rgba(186,117,23,0.18)",bClr:"#e09940"},project:{label:"Project",icon:"ti-layout-kanban",accent:"#378ADD",iBg:"rgba(55,138,221,0.18)",bBg:"rgba(55,138,221,0.18)",bClr:"#60aaf0"}};
const QUEUES={support:{label:"Support",icon:"ti-headset",accent:"#7F77DD",tabBg:"rgba(127,119,221,0.12)",types:{incident:{cats:[{name:"Hardware",icon:"ti-device-desktop",subs:["Desktop / workstation","Laptop / notebook","Server / NAS","Printer / scanner","Monitor / display","Peripheral (keyboard, mouse, dock)","Network equipment (switch, AP, router)","UPS / power supply"]},{name:"Software",icon:"ti-apps",subs:["Application error / crash","Installation / upgrade failure","Licensing issue","Performance / slowness","Compatibility issue","Configuration / settings"]},{name:"Network & connectivity",icon:"ti-network",subs:["LAN / cabling","Wi-Fi / wireless (on-site)","DNS / DHCP","VPN / remote access","Firewall / filtering","Proxy / web content","Network performance / latency","Routing issue"]},{name:"Email & collaboration",icon:"ti-mail",subs:["Send / receive failure","Spam / phishing report","Calendar / contacts sync","Teams / meetings","Shared mailbox fault","Email migration / archive"]},{name:"Identity & access",icon:"ti-lock",subs:["Account locked / password reset","MFA / authenticator issue","SSO / conditional access","Permission / access fault","Privileged / admin access issue"]},{name:"Microsoft 365 / cloud",icon:"ti-cloud",subs:["Exchange Online","SharePoint / OneDrive","Microsoft Teams","Intune / endpoint management","Entra ID / Azure AD","Azure services"]},{name:"Security",icon:"ti-shield",subs:["Malware / ransomware","Phishing / social engineering","Security incident / breach","Vulnerability / patch","Data loss prevention alert","Endpoint protection alert","Suspicious activity / anomaly"]},{name:"Backup & recovery",icon:"ti-database",subs:["Backup job failure","Data restore request","DR / BCP test","Archive / retention query","Cloud backup (M365 / server)"]}]},request:{cats:[{name:"User & identity",icon:"ti-user",subs:["New user setup / onboarding","User offboarding","Account name change","Role / group change","Guest / external account"]},{name:"Access & permissions",icon:"ti-key",subs:["Shared drive / folder access","SharePoint / Teams site access","Application access request","Distribution group / shared mailbox","Admin / elevated access request"]},{name:"Hardware & equipment",icon:"ti-device-laptop",subs:["New equipment / kit request","Equipment replacement","Peripheral request","Loan / temporary equipment"]},{name:"Software & licensing",icon:"ti-license",subs:["Software licence request","Application installation","Licence transfer","Software removal / decommission"]},{name:"Microsoft 365 / cloud",icon:"ti-cloud",subs:["Mailbox configuration","Teams channel / site setup","OneDrive / SharePoint provisioning","M365 group creation","Licence assignment / removal"]},{name:"Network",icon:"ti-network",subs:["Wi-Fi access request","VPN access request","Network drive mapping","Firewall rule request","Guest network access"]},{name:"IT procurement",icon:"ti-shopping-cart",subs:["Hardware purchase request","Software purchase request","Vendor quote request","Asset disposal / collection"]},{name:"General IT request",icon:"ti-help",subs:["IT policy / guidance query","Asset / inventory query","IT documentation request","Account unlock (self-service bypass)"]}]},change:{cats:[{name:"Infrastructure",icon:"ti-server",subs:["Server configuration change","Firewall rule change","DNS / DHCP change","Storage change"]},{name:"Network",icon:"ti-network",subs:["LAN / switching configuration","Wi-Fi / SSID change","VPN configuration change","Routing change","Network segmentation / VLAN"]},{name:"Endpoint & device",icon:"ti-device-desktop",subs:["Device build / rebuild","Policy / GPO change","Software deployment","OS upgrade / migration"]},{name:"Identity & security",icon:"ti-shield-lock",subs:["Security policy change","Conditional access policy","Privileged access change","Certificate renewal / replacement"]},{name:"Microsoft 365 / cloud",icon:"ti-cloud",subs:["Tenant configuration change","Exchange transport rule","SharePoint / Teams admin change","Azure resource change","Intune / Entra policy update"]},{name:"Scheduled maintenance",icon:"ti-calendar-event",subs:["Patching window","Backup configuration change","Scheduled downtime / outage","Vendor maintenance window"]}]},project:{cats:[{name:"Infrastructure",icon:"ti-server",subs:["New site / office setup","Server migration","Network refresh","Data centre / comms room work"]},{name:"Cloud & Microsoft 365",icon:"ti-cloud",subs:["M365 tenant migration","Azure deployment","Cloud migration","Entra ID / identity project"]},{name:"Security & compliance",icon:"ti-shield",subs:["Cyber Essentials / compliance rollout","Security audit / assessment","Endpoint security rollout","MFA / zero trust deployment"]},{name:"End user computing",icon:"ti-device-laptop",subs:["Device refresh / rollout","OS migration project","Application rollout"]},{name:"Project administration",icon:"ti-clipboard",subs:["Scoping / discovery","Project documentation","Third-party vendor coordination","Handover / sign-off","Customer onboarding"]}]}}},voip:{label:"VOIP / Mobile / Connectivity",icon:"ti-phone-call",accent:"#1D9E75",tabBg:"rgba(29,158,117,0.12)",types:{incident:{cats:[{name:"VOIP & telephony",icon:"ti-phone",subs:["No dial tone / calls failing","One-way or no audio","Poor call quality","Inbound calls not received","Call dropping / disconnecting","Handset / deskphone fault","Softphone / app issue","Voicemail / auto-attendant fault","VOIP platform / trunk outage"]},{name:"SIM / mobile service",icon:"ti-antenna",subs:["SIM not activating","No mobile data","No outbound calls / texts","Inbound calls / texts not received","Poor signal / coverage issue","Roaming not working","SIM card fault / unreadable","Wrong tariff applied"]},{name:"Connectivity / line fault",icon:"ti-router",subs:["Broadband line down","Leased line / MPLS fault","Circuit intermittent / dropping","ISP routing issue","Line speed degradation","Failover not activating","Provider outage"]}]},request:{cats:[{name:"VOIP & telephony",icon:"ti-phone-plus",subs:["New extension / user provisioning","Hunt group / IVR change","New DDI / number request","Voicemail setup / greeting change"]},{name:"Hardware & equipment",icon:"ti-device-desktop",subs:["New equipment / kit request","Equipment replacement","Peripheral request","Loan / temporary equipment"]},{name:"SIM / mobile service",icon:"ti-antenna",subs:["New SIM request","SIM replacement","Number port in","Tariff change","Additional data / bolt-on","International roaming enable","SIM barring / unbarring","Cease SIM"]},{name:"Connectivity / line",icon:"ti-router",subs:["New broadband / leased line","Circuit upgrade / speed increase","Failover / resilience request","Static IP request","Cease / transfer line"]}]},change:{cats:[{name:"VOIP & telephony",icon:"ti-phone-call",subs:["PBX / platform configuration change","SIP trunk change","Call routing / IVR change"]},{name:"SIM / mobile service",icon:"ti-antenna",subs:["Tariff plan change","Bolt-on addition / removal","Roaming policy change","Spend cap change","SIM pool reallocation"]},{name:"Connectivity / line",icon:"ti-router",subs:["Circuit configuration change","Failover configuration change","Router / CPE change (provider-managed)","IP addressing change"]}]},project:{cats:[{name:"VOIP & telephony",icon:"ti-phone",subs:["New VOIP system deployment","VOIP platform migration","Site telephony rollout"]},{name:"SIM / mobile service",icon:"ti-antenna",subs:["New SIM fleet provisioning","Number porting project","Mobile tariff review / migration","SIM consolidation across sites"]},{name:"Connectivity project",icon:"ti-router",subs:["New site connectivity","Broadband / leased line upgrade","SD-WAN deployment","Multi-site connectivity","Cabling"]}]}}}};
const qtabsEl=document.getElementById("qtabs"),qpanesEl=document.getElementById("qpanes"),qkeys=Object.keys(QUEUES);
qkeys.forEach((qkey,qi)=>{const Q=QUEUES[qkey],isQA=qi===0;const ttS=Object.entries(Q.types).map(([k,t])=>({label:{incident:"Incident",request:"Service request",change:"Change request",project:"Project"}[k],cats:t.cats.length,subs:t.cats.reduce((a,c)=>a+c.subs.length,0)}));const tC=ttS.reduce((a,s)=>a+s.cats,0),tS=ttS.reduce((a,s)=>a+s.subs,0);const qtab=document.createElement("div");qtab.className="q-tab"+(isQA?" active":"");qtab.style.background=isQA?Q.accent:Q.tabBg;if(isQA)qtab.style.border="1px solid transparent";const iC=isQA?"#fff":Q.accent,iB=isQA?"rgba(255,255,255,0.18)":Q.tabBg.replace("0.12","0.25");qtab.innerHTML=`<div class="q-top"><div class="q-iw" style="background:${iB}"><i class="ti ${Q.icon}" style="font-size:20px;color:${iC}"></i></div><div class="q-head"><div class="q-label">${Q.label}</div><div class="q-total">${tC} issue types &middot; ${tS} sub-issue types</div></div></div><div class="q-breakdown">${ttS.map(s=>`<div class="q-stat"><span class="q-stat-label">${s.label}</span><span class="q-stat-nums">${s.cats} types &middot; ${s.subs} sub</span></div>`).join("")}</div>`;qtab.onclick=()=>{qkeys.forEach((k,i)=>{const Qk=QUEUES[k],el=qtabsEl.children[i];el.classList.remove("active");el.style.background=Qk.tabBg;el.style.border="1px solid #2a2a2e";el.querySelector(".q-iw").style.background=Qk.tabBg.replace("0.12","0.25");el.querySelector(".ti").style.color=Qk.accent;el.querySelector(".q-label").style.color="#a0a0a8";el.querySelector(".q-total").style.color="#444450";el.querySelectorAll(".q-stat").forEach(x=>x.style.background="#17171a");el.querySelectorAll(".q-stat-label").forEach(x=>x.style.color="#555560");el.querySelectorAll(".q-stat-nums").forEach(x=>x.style.color="#444450");});qtab.classList.add("active");qtab.style.background=Q.accent;qtab.style.border="1px solid transparent";qtab.querySelector(".q-iw").style.background="rgba(255,255,255,0.18)";qtab.querySelector(".ti").style.color="#fff";qtab.querySelector(".q-label").style.color="#fff";qtab.querySelector(".q-total").style.color="rgba(255,255,255,0.4)";qtab.querySelectorAll(".q-stat").forEach(x=>x.style.background="rgba(0,0,0,0.2)");qtab.querySelectorAll(".q-stat-label").forEach(x=>x.style.color="rgba(255,255,255,0.5)");qtab.querySelectorAll(".q-stat-nums").forEach(x=>x.style.color="rgba(255,255,255,0.55)");document.querySelectorAll(".q-pane").forEach(p=>p.classList.remove("active"));document.getElementById("qp-"+qkey).classList.add("active");};qtabsEl.appendChild(qtab);const qpane=document.createElement("div");qpane.className="q-pane"+(isQA?" active":"");qpane.id="qp-"+qkey;const ttTD=document.createElement("div");ttTD.className="tt-tabs";const ttPD=document.createElement("div");Object.keys(Q.types).forEach((ttkey,tti)=>{const TTC=TT[ttkey],cats=Q.types[ttkey].cats,isTTA=tti===0,ttId=`${qkey}-${ttkey}`;const tttab=document.createElement("div");tttab.className="tt-tab"+(isTTA?" active":"");if(isTTA){tttab.style.background=TTC.accent;tttab.style.border="1px solid transparent";tttab.style.color="#fff";}tttab.innerHTML=`<i class="ti ${TTC.icon}"></i>${TTC.label}`;tttab.onclick=()=>{ttTD.querySelectorAll(".tt-tab").forEach(x=>{x.classList.remove("active");x.style.background="";x.style.border="1px solid #2a2a2e";x.style.color="#777788";});tttab.classList.add("active");tttab.style.background=TTC.accent;tttab.style.border="1px solid transparent";tttab.style.color="#fff";ttPD.querySelectorAll(".tt-pane").forEach(x=>x.classList.remove("active"));document.getElementById("ttp-"+ttId).classList.add("active");};ttTD.appendChild(tttab);const ttPane=document.createElement("div");ttPane.className="tt-pane"+(isTTA?" active":"");ttPane.id="ttp-"+ttId;const total=cats.reduce((a,c)=>a+c.subs.length,0);ttPane.innerHTML=`<div class="pane-hdr"><div class="pane-left"><div class="pane-title">${Q.label} — ${TTC.label}</div><div class="toggle-btns"><button class="toggle-btn" onclick="expandAll('${ttId}')"><i class="ti ti-chevrons-down" style="font-size:11px"></i>Expand all</button><button class="toggle-btn" onclick="collapseAll('${ttId}')"><i class="ti ti-chevrons-up" style="font-size:11px"></i>Collapse all</button></div></div><div class="stats"><div class="stat"><div class="stat-n">${cats.length}</div><div class="stat-l">issue types</div></div><div class="stat"><div class="stat-n">${total}</div><div class="stat-l">sub-issue types</div></div></div></div>`;const grid=document.createElement("div");grid.className="grid";cats.forEach((c,ci)=>{const id=`${ttId}-${ci}`;const card=document.createElement("div");card.className="cat";card.setAttribute("data-scope",ttId);card.innerHTML=`<div class="cat-head" onclick="tog('${id}')"><div class="c-iw" style="background:${TTC.iBg}"><i class="ti ${c.icon}" style="color:${TTC.accent};font-size:17px"></i></div><div class="c-name">${c.name}</div><div class="c-badge" style="background:${TTC.bBg};color:${TTC.bClr}">${c.subs.length}</div><i class="ti ti-chevron-down chev" id="ch-${id}"></i></div><div class="sub-wrap" id="sw-${id}"><div class="sub-inner">${c.subs.map((s,si)=>`<div class="sub-item"><span class="sub-n">${si+1}</span><span class="sub-txt">${s}</span></div>`).join("")}<div class="copy-row"><button class="copy-btn" onclick="cp(event,${JSON.stringify(c.subs)},this)"><i class="ti ti-copy" style="font-size:11px"></i>Copy</button></div></div></div>`;grid.appendChild(card);});ttPane.appendChild(grid);ttPD.appendChild(ttPane);});qpane.appendChild(ttTD);qpane.appendChild(ttPD);qpanesEl.appendChild(qpane);});
function tog(id){const sw=document.getElementById("sw-"+id),ch=document.getElementById("ch-"+id);sw.classList.toggle("open");ch.classList.toggle("open",sw.classList.contains("open"));}
function expandAll(scope){document.querySelectorAll(`[data-scope="${scope}"]`).forEach(card=>{const id=card.querySelector(".sub-wrap").id.replace("sw-","");document.getElementById("sw-"+id).classList.add("open");document.getElementById("ch-"+id).classList.add("open");});}
function collapseAll(scope){document.querySelectorAll(`[data-scope="${scope}"]`).forEach(card=>{const id=card.querySelector(".sub-wrap").id.replace("sw-","");document.getElementById("sw-"+id).classList.remove("open");document.getElementById("ch-"+id).classList.remove("open");});}
function cp(e,subs,btn){e.stopPropagation();navigator.clipboard.writeText(subs.join("\n")).then(()=>{btn.innerHTML='<i class="ti ti-copy" style="font-size:11px"></i>Copied!';btn.classList.add("done");setTimeout(()=>{btn.innerHTML='<i class="ti ti-copy" style="font-size:11px"></i>Copy';btn.classList.remove("done")},1800);});}
</script>
